<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cabin Tracker — Dashboard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d0d;
      --surface:   #141414;
      --border:    #1e1e1e;
      --text:      #e8e8e8;
      --muted:     #444;
      --dim:       #2a2a2a;
      --green:     #4caf6e;
      --red:       #c0392b;
      --amber:     #c8922a;
      --blue:      #3a6080;
      --mono:      'DM Mono', monospace;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      font-size: 13px;
    }

    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-columns: 200px 1fr;
      min-height: 100vh;
    }

    /* ── Sidebar ── */
    .sidebar {
      border-right: 1px solid var(--border);
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .brand {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--text);
      text-transform: uppercase;
    }
    .brand-sub {
      font-size: 9px;
      letter-spacing: 0.15em;
      color: var(--muted);
      margin-top: 4px;
      text-transform: uppercase;
    }

    .nav-label {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .store-list { display: flex; flex-direction: column; gap: 2px; }
    .store-item {
      font-size: 10px;
      letter-spacing: 0.1em;
      padding: 7px 10px;
      cursor: pointer;
      color: var(--muted);
      border: 1px solid transparent;
      transition: all 0.15s;
      text-transform: uppercase;
    }
    .store-item:hover  { color: var(--text); border-color: var(--dim); }
    .store-item.active { color: var(--text); border-color: var(--border); background: var(--surface); }

    .sidebar-footer {
      margin-top: auto;
      font-size: 9px;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
      line-height: 1.8;
    }
    .conn-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
    }
    .conn-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    .conn-dot.live { background: var(--green); }
    .conn-dot.stale { background: var(--amber); animation: blink 1s infinite; }

    /* ── Main ── */
    .main {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .topbar {
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .topbar-title {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text);
    }
    .topbar-meta {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
    }

    .range-tabs {
      display: flex;
      gap: 1px;
      background: var(--border);
    }
    .range-tab {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      padding: 5px 12px;
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }
    .range-tab:hover  { color: var(--text); }
    .range-tab.active { background: var(--dim); color: var(--text); }

    .content { padding: 2rem; display: flex; flex-direction: column; gap: 1.5rem; }

    /* ── Stat cards ── */
    .stat-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border);
    }

    .stat-card {
      background: var(--surface);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .stat-card-label {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .stat-card-value {
      font-family: var(--mono);
      font-size: 32px;
      font-weight: 300;
      line-height: 1;
      color: var(--text);
    }
    .stat-card-value.green  { color: var(--green); }
    .stat-card-value.red    { color: var(--red); }
    .stat-card-value.amber  { color: var(--amber); }
    .stat-card-sub {
      font-size: 9px;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* ── Charts row ── */
    .charts-row {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 1px;
      background: var(--border);
    }

    .chart-card {
      background: var(--surface);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .chart-title {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    canvas { display: block; width: 100% !important; }

    /* ── Cabin table ── */
    .table-card {
      background: var(--surface);
      padding: 1.5rem;
    }
    .table-title {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }
    thead th {
      font-size: 8px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 6px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      font-weight: 400;
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--dim); }
    tbody td {
      padding: 10px 12px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text);
    }

    .state-pill {
      display: inline-block;
      font-size: 8px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 3px 8px;
      border: 1px solid;
    }
    .state-pill.empty    { border-color: var(--green); color: var(--green); }
    .state-pill.full     { border-color: #666; color: #ccc; }
    .state-pill.clearing { border-color: var(--amber); color: var(--amber); }

    /* ── Alert banner ── */
    .alerts { display: flex; flex-direction: column; gap: 4px; }
    .alert-item {
      font-size: 10px;
      letter-spacing: 0.1em;
      padding: 8px 12px;
      border-left: 2px solid var(--amber);
      background: rgba(200, 146, 42, 0.06);
      color: var(--amber);
      text-transform: uppercase;
      display: flex;
      justify-content: space-between;
    }
    .alert-item.critical { border-color: var(--red); background: rgba(192,57,43,0.06); color: var(--red); }
    .no-alerts {
      font-size: 9px;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
      padding: 8px 0;
    }

    /* ── Loading / error ── */
    .loading {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 3rem 2rem;
      text-align: center;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .stat-row { grid-template-columns: repeat(2, 1fr); }
      .charts-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div>
      <div class="brand">Cabin Tracker</div>
      <div class="brand-sub">Analytics</div>
    </div>

    <div>
      <div class="nav-label">Stores</div>
      <div class="store-list" id="store-list">
        <div class="loading">Loading…</div>
      </div>
    </div>

    <div class="sidebar-footer">
      <div class="conn-indicator">
        <div class="conn-dot" id="conn-dot"></div>
        <span id="conn-label">Connecting</span>
      </div>
      <div id="last-update">—</div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="topbar">
      <span class="topbar-title" id="page-title">—</span>
      <div style="display:flex; gap:1rem; align-items:center; flex-wrap:wrap;">
        <span class="topbar-meta" id="topbar-time">—</span>
        <div class="range-tabs">
          <button class="range-tab active" onclick="setRange(4,this)">4h</button>
          <button class="range-tab" onclick="setRange(8,this)">8h</button>
          <button class="range-tab" onclick="setRange(24,this)">24h</button>
        </div>
        <button class="range-tab" id="sound-toggle" onclick="toggleSound()" title="Play a sound on critical alerts">🔈 Sound</button>
        <button class="range-tab" onclick="exportCsv()">⬇ Export CSV</button>
      </div>
    </div>

    <div class="content" id="content">
      <div class="loading">Select a store to begin</div>
    </div>
  </main>

</div>

<script>
  // ─── CONFIG ──────────────────────────────────────────────────────────────────
  // Derived from the current page location, so this works whether the
  // dashboard is opened as http://localhost:3000/dashboard or from another
  // host/port (e.g. a LAN IP) — no more hardcoded localhost.
  const API       = `${window.location.protocol}//${window.location.host}`;
  const WS_BASE   = `${window.location.protocol === 'https:' ? 'wss' : 'ws'}://${window.location.host}`;
  const REFRESH_S = 30; // analytics kaç saniyede bir yenilenir

  const urlParams   = new URLSearchParams(window.location.search);
  let currentStore  = urlParams.get('store') || null;
  let rangeHours    = 4;
  let ws            = null;
  let retryTimeout  = null;
  let retryDelay    = 1000;
  let refreshTimer  = null;
  let cabins        = [];          // live state
  let dwellStart    = {};          // cabinId → timestamp (ne zaman doldu)
  let analyticsData = null;
  let soundOn       = false;
  const criticalAlertsSeen = new Set(); // avoids re-beeping every render tick

  // ─── SOUND (buzzer alert for cabins occupied too long) ───────────────────────
  function toggleSound() {
    soundOn = !soundOn;
    document.getElementById('sound-toggle').textContent = soundOn ? '🔊 Sound' : '🔈 Sound';
    document.getElementById('sound-toggle').classList.toggle('active', soundOn);
  }

  function beep() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
      osc.connect(gain).connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + 0.4);
    } catch { /* Web Audio unsupported/blocked — fail silently */ }
  }

  function checkCriticalAlerts(longStay) {
    if (!soundOn) return;
    longStay.filter(ls => ls.mins >= 30).forEach(ls => {
      const key = `${ls.id}`;
      if (!criticalAlertsSeen.has(key)) {
        criticalAlertsSeen.add(key);
        beep();
      }
    });
    // clear "seen" flags for cabins no longer in critical state
    [...criticalAlertsSeen].forEach(key => {
      if (!longStay.some(ls => `${ls.id}` === key && ls.mins >= 30)) criticalAlertsSeen.delete(key);
    });
  }

  // ─── EXPORT ───────────────────────────────────────────────────────────────────
  function exportCsv() {
    if (!currentStore) return;
    window.open(`${API}/api/events/${currentStore}?format=csv`, '_blank');
  }

  // ─── BOOT ────────────────────────────────────────────────────────────────────
  loadStores();
  setInterval(updateClock, 1000);

  function updateClock() {
    const el = document.getElementById('topbar-time');
    if (el) el.textContent = new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  // ─── STORES ──────────────────────────────────────────────────────────────────
  async function loadStores() {
    try {
      const res  = await fetch(`${API}/api/stores`);
      const list = await res.json();
      renderStoreList(list);
      if (!currentStore && list.length) selectStore(list[0].id);
      else if (currentStore) selectStore(currentStore);
    } catch {
      document.getElementById('store-list').innerHTML =
        '<div style="font-size:9px;color:#444;letter-spacing:.1em;text-transform:uppercase">Server offline</div>';
    }
  }

  function renderStoreList(list) {
    const el = document.getElementById('store-list');
    el.innerHTML = '';
    list.forEach(s => {
      const item = document.createElement('div');
      item.className = 'store-item' + (s.id === currentStore ? ' active' : '');
      item.textContent = s.name || s.id;
      item.onclick = () => selectStore(s.id);
      item.id = `si-${s.id}`;
      el.appendChild(item);
    });
  }

  function selectStore(storeId) {
    currentStore = storeId;
    document.querySelectorAll('.store-item').forEach(el => {
      el.classList.toggle('active', el.id === `si-${storeId}`);
    });
    document.getElementById('page-title').textContent = storeId;
    connectWS();
    fetchAnalytics();
    clearInterval(refreshTimer);
    refreshTimer = setInterval(fetchAnalytics, REFRESH_S * 1000);
  }

  // ─── WEBSOCKET (live state) ───────────────────────────────────────────────────
  function connectWS() {
    if (ws) { ws.onclose = null; ws.close(); }
    clearTimeout(retryTimeout);

    if (!window.location.host) {
      setConn('stale');
      document.getElementById('conn-label').textContent = 'Open via http://localhost:3000/dashboard';
      return;
    }

    try {
      ws = new WebSocket(`${WS_BASE}?store=${currentStore}`);
    } catch (err) {
      console.error('WebSocket construction failed:', err);
      setConn('stale');
      retryTimeout = setTimeout(() => { connectWS(); retryDelay = Math.min(retryDelay * 2, 16000); }, retryDelay);
      return;
    }

    ws.onopen = () => {
      retryDelay = 1000;
      setConn('live');
    };

    ws.onmessage = (e) => {
      try {
        const data = JSON.parse(e.data);
        if (data.type === 'init') {
          cabins = data.cabins;
          if (data.storeName) document.getElementById('page-title').textContent = data.storeName;
          renderLive();
        }
        if (data.type === 'update') {
          const cabin = cabins.find(c => c.id === data.id);
          if (cabin) {
            // dwell tracking (client-side, tamamlayıcı)
            if (data.state === 'full')  dwellStart[data.id] = Date.now();
            if (data.state !== 'full')  delete dwellStart[data.id];
            cabin.state = data.state;
          }
          renderLive();
        }
      } catch {}
    };

    ws.onclose = () => {
      setConn('stale');
      retryTimeout = setTimeout(() => {
        connectWS();
        retryDelay = Math.min(retryDelay * 2, 16000);
      }, retryDelay);
    };

    ws.onerror = () => ws.close();
  }

  function setConn(state) {
    const dot   = document.getElementById('conn-dot');
    const label = document.getElementById('conn-label');
    dot.className = `conn-dot ${state}`;
    label.textContent = state === 'live' ? 'Live' : 'Reconnecting';
  }

  // ─── ANALYTICS FETCH ─────────────────────────────────────────────────────────
  async function fetchAnalytics() {
    if (!currentStore) return;
    try {
      const res = await fetch(`${API}/api/analytics/${currentStore}?hours=${rangeHours}`);
      analyticsData = await res.json();
      document.getElementById('last-update').textContent =
        'Updated ' + new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
      renderDashboard();
    } catch {
      // server offline — sadece live state göster
      renderLive();
    }
  }

  function setRange(hours, btn) {
    rangeHours = hours;
    document.querySelectorAll('.range-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    fetchAnalytics();
  }

  // ─── RENDER ──────────────────────────────────────────────────────────────────
  function renderDashboard() {
    const d = analyticsData;
    if (!d) return renderLive();

    // live cabins'i analytics ile birleştir
    const free  = cabins.length ? cabins.filter(c => c.state === 'empty').length   : d.currentFree;
    const occ   = cabins.length ? cabins.filter(c => c.state === 'full').length    : d.currentOccupied;
    const clr   = cabins.length ? cabins.filter(c => c.state === 'clearing').length : 0;
    const total = d.totalCabins;

    // ortalama dwell time (tüm kabinler)
    const dwellVals = Object.values(d.avgDwellByCabin || {});
    const avgDwell  = dwellVals.length
      ? Math.round(dwellVals.reduce((a, b) => a + b, 0) / dwellVals.length)
      : null;

    // en yoğun saat
    const hourly = d.hourlyTraffic || {};
    const peakHour = Object.keys(hourly).length
      ? Object.keys(hourly).reduce((a, b) => hourly[a] > hourly[b] ? a : b)
      : null;

    // uzun süredir dolu kabinler (uyarı: 15+ dk)
    const longStay = [];
    cabins.forEach(c => {
      if (c.state === 'full' && dwellStart[c.id]) {
        const mins = Math.floor((Date.now() - dwellStart[c.id]) / 60000);
        if (mins >= 15) longStay.push({ id: c.id, mins });
      }
    });
    checkCriticalAlerts(longStay);

    const content = document.getElementById('content');
    content.innerHTML = `
      <!-- Stat cards -->
      <div class="stat-row">
        <div class="stat-card">
          <span class="stat-card-label">Free now</span>
          <span class="stat-card-value ${free === 0 ? 'red' : 'green'}">${free}</span>
          <span class="stat-card-sub">of ${total} cabins</span>
        </div>
        <div class="stat-card">
          <span class="stat-card-label">Occupied now</span>
          <span class="stat-card-value">${occ}</span>
          <span class="stat-card-sub">${clr > 0 ? `+ ${clr} clearing` : 'no clearing'}</span>
        </div>
        <div class="stat-card">
          <span class="stat-card-label">Visits (${rangeHours}h)</span>
          <span class="stat-card-value">${d.totalVisits || 0}</span>
          <span class="stat-card-sub">${peakHour !== null ? `peak at ${peakHour}:00` : 'no peak data'}</span>
        </div>
        <div class="stat-card">
          <span class="stat-card-label">Avg dwell time</span>
          <span class="stat-card-value ${avgDwell >= 20 ? 'amber' : ''}">${avgDwell !== null ? avgDwell + 's' : '—'}</span>
          <span class="stat-card-sub">time spent per cabin</span>
        </div>
      </div>

      <!-- Cleaning stats -->
      <div class="stat-row">
        <div class="stat-card">
          <span class="stat-card-label">Avg cleaning time</span>
          <span class="stat-card-value ${d.overallAvgClearingS > 25 ? 'amber' : 'green'}">${d.overallAvgClearingS !== null ? d.overallAvgClearingS + 's' : '—'}</span>
          <span class="stat-card-sub">across all cabins</span>
        </div>
        <div class="stat-card">
          <span class="stat-card-label">Slowest cabin</span>
          <span class="stat-card-value ${d.slowestCabinTimeS > 25 ? 'amber' : ''}">${d.slowestCabin !== null ? String(d.slowestCabin).padStart(2,'0') : '—'}</span>
          <span class="stat-card-sub">${d.slowestCabinTimeS ? `avg ${d.slowestCabinTimeS}s to clear` : 'no data yet'}</span>
        </div>
        <div class="stat-card">
          <span class="stat-card-label">Total cleanings</span>
          <span class="stat-card-value">${Object.values(d.clearingCountByCabin || {}).reduce((a,b) => a+b, 0)}</span>
          <span class="stat-card-sub">in last ${rangeHours}h</span>
        </div>
        <div class="stat-card">
          <span class="stat-card-label">Efficiency</span>
          <span class="stat-card-value ${d.overallAvgClearingS !== null && d.overallAvgClearingS <= 20 ? 'green' : d.overallAvgClearingS > 25 ? 'amber' : ''}">${
            d.overallAvgClearingS === null ? '—'
            : d.overallAvgClearingS <= 20 ? 'Good'
            : d.overallAvgClearingS <= 25 ? 'OK'
            : 'Slow'
          }</span>
          <span class="stat-card-sub">${d.overallAvgClearingS !== null ? `target ≤ 20s` : 'not enough data'}</span>
        </div>
      </div>

      <!-- Alerts -->
      <div class="table-card">
        <div class="table-title">Alerts</div>
        <div class="alerts" id="alerts-container">
          ${longStay.length === 0
            ? '<div class="no-alerts">No active alerts</div>'
            : longStay.map(ls => `
                <div class="alert-item ${ls.mins >= 30 ? 'critical' : ''}">
                  <span>Cabin ${String(ls.id).padStart(2,'0')} — occupied ${ls.mins} min</span>
                  <span>${ls.mins >= 30 ? 'Critical' : 'Warning'}</span>
                </div>`).join('')
          }
        </div>
      </div>

      <!-- Charts -->
      <div class="charts-row">
        <div class="chart-card">
          <div class="chart-title">Hourly traffic — last ${rangeHours}h</div>
          <canvas id="hourly-chart" height="160"></canvas>
        </div>
        <div class="chart-card">
          <div class="chart-title">Cabin usage</div>
          <canvas id="usage-chart" height="160"></canvas>
        </div>
      </div>

      <!-- Cleaning time chart -->
      <div class="charts-row">
        <div class="chart-card">
          <div class="chart-title">Avg cleaning time per cabin (seconds) — target ≤ 20s</div>
          <canvas id="cleaning-chart" height="160"></canvas>
        </div>
        <div class="chart-card">
          <div class="chart-title">Cleaning count per cabin</div>
          <canvas id="cleaning-count-chart" height="160"></canvas>
        </div>
      </div>

      <!-- Cabin table -->
      <div class="table-card">
        <div class="table-title">Cabin detail</div>
        <table>
          <thead>
            <tr>
              <th>Cabin</th>
              <th>State</th>
              <th>Visits</th>
              <th>Avg dwell</th>
              <th>Avg clean</th>
              <th>Cleanings</th>
              <th>In use since</th>
            </tr>
          </thead>
          <tbody id="cabin-tbody"></tbody>
        </table>
      </div>
    `;

    drawHourlyChart(hourly);
    drawUsageChart(d.usageCountByCabin || {}, total);
    drawCleaningChart(d.avgClearingByCabin || {}, total);
    drawCleaningCountChart(d.clearingCountByCabin || {}, total);
    renderCabinTable(d);
  }

  function renderLive() {
    // analytics verisi yokken sadece live state göster
    if (analyticsData) { renderDashboard(); return; }
    const free  = cabins.filter(c => c.state === 'empty').length;
    const occ   = cabins.filter(c => c.state === 'full').length;
    const clr   = cabins.filter(c => c.state === 'clearing').length;
    document.getElementById('content').innerHTML = `
      <div class="stat-row">
        <div class="stat-card">
          <span class="stat-card-label">Free</span>
          <span class="stat-card-value ${free === 0 ? 'red' : 'green'}">${free}</span>
        </div>
        <div class="stat-card">
          <span class="stat-card-label">Occupied</span>
          <span class="stat-card-value">${occ}</span>
        </div>
        <div class="stat-card">
          <span class="stat-card-label">Clearing</span>
          <span class="stat-card-value amber">${clr}</span>
        </div>
        <div class="stat-card">
          <span class="stat-card-label">Total</span>
          <span class="stat-card-value">${cabins.length}</span>
        </div>
      </div>
      <div class="loading">Analytics loading…</div>
    `;
  }

  function renderCabinTable(d) {
    const tbody = document.getElementById('cabin-tbody');
    if (!tbody) return;
    tbody.innerHTML = '';
    cabins.forEach(c => {
      const visits      = d.usageCountByCabin?.[c.id] || 0;
      const avgDwell    = d.avgDwellByCabin?.[c.id] ? `${d.avgDwellByCabin[c.id]}s` : '—';
      const avgClean    = d.avgClearingByCabin?.[c.id] ? `${d.avgClearingByCabin[c.id]}s` : '—';
      const cleanCount  = d.clearingCountByCabin?.[c.id] || 0;
      const sinceMs     = c.state === 'full' && dwellStart[c.id] ? Date.now() - dwellStart[c.id] : null;
      const sinceStr    = sinceMs ? `${Math.floor(sinceMs / 60000)}m ${Math.floor((sinceMs % 60000) / 1000)}s` : '—';

      // temizlik süresi renge göre sınıflandır
      const cleanVal    = d.avgClearingByCabin?.[c.id] || null;
      const cleanColor  = cleanVal === null ? '' : cleanVal <= 20 ? 'color:var(--green)' : cleanVal > 25 ? 'color:var(--amber)' : '';

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${String(c.id).padStart(2, '0')}</td>
        <td><span class="state-pill ${c.state}">${c.state}</span></td>
        <td>${visits}</td>
        <td>${avgDwell}</td>
        <td style="${cleanColor}">${avgClean}</td>
        <td>${cleanCount}</td>
        <td>${sinceStr}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  // ─── CHARTS (vanilla canvas, no deps) ────────────────────────────────────────
  function drawHourlyChart(hourlyData) {
    const canvas = document.getElementById('hourly-chart');
    if (!canvas) return;
    canvas.width  = canvas.offsetWidth || 600;
    canvas.height = 160;

    const ctx    = canvas.getContext('2d');
    const now    = new Date();
    const hours  = Array.from({ length: rangeHours }, (_, i) => (now.getHours() - rangeHours + 1 + i + 24) % 24);
    const values = hours.map(h => hourlyData[h] || 0);
    const max    = Math.max(...values, 1);

    const pad = { top: 16, right: 16, bottom: 28, left: 32 };
    const w   = canvas.width  - pad.left - pad.right;
    const h   = canvas.height - pad.top  - pad.bottom;
    const barW = Math.max(2, w / hours.length - 4);

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // gridlines
    ctx.strokeStyle = '#1e1e1e';
    ctx.lineWidth = 1;
    [0, 0.25, 0.5, 0.75, 1].forEach(ratio => {
      const y = pad.top + h * (1 - ratio);
      ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + w, y); ctx.stroke();
    });

    // bars
    values.forEach((val, i) => {
      const x      = pad.left + (i / hours.length) * w + (w / hours.length - barW) / 2;
      const barH   = (val / max) * h;
      const y      = pad.top + h - barH;
      const alpha  = 0.35 + 0.65 * (val / max);
      ctx.fillStyle = `rgba(76, 175, 110, ${alpha})`;
      ctx.fillRect(x, y, barW, barH);
    });

    // x labels
    ctx.fillStyle = '#444';
    ctx.font = '9px Inter, sans-serif';
    ctx.textAlign = 'center';
    hours.forEach((h24, i) => {
      if (i % Math.ceil(hours.length / 6) === 0) {
        const x = pad.left + (i / hours.length) * w + w / hours.length / 2;
        ctx.fillText(`${String(h24).padStart(2,'0')}:00`, x, canvas.height - 6);
      }
    });

    // y label (max)
    ctx.fillStyle = '#333';
    ctx.textAlign = 'right';
    ctx.fillText(max, pad.left - 4, pad.top + 10);
  }

  function drawUsageChart(usageData, totalCabins) {
    const canvas = document.getElementById('usage-chart');
    if (!canvas) return;
    canvas.width  = canvas.offsetWidth || 260;
    canvas.height = 160;

    const ctx    = canvas.getContext('2d');
    const ids    = Array.from({ length: totalCabins }, (_, i) => i + 1);
    const values = ids.map(id => usageData[id] || 0);
    const max    = Math.max(...values, 1);

    const pad = { top: 16, right: 16, bottom: 28, left: 28 };
    const w   = canvas.width  - pad.left - pad.right;
    const h   = canvas.height - pad.top  - pad.bottom;
    const barW = Math.max(2, w / ids.length - 3);

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    values.forEach((val, i) => {
      const x     = pad.left + (i / ids.length) * w + (w / ids.length - barW) / 2;
      const barH  = (val / max) * h;
      const y     = pad.top + h - barH;
      const alpha = 0.25 + 0.75 * (val / max);
      ctx.fillStyle = `rgba(58, 96, 128, ${alpha})`;
      ctx.fillRect(x, y, barW, barH);
    });

    // cabin number labels (her 2'de bir)
    ctx.fillStyle = '#444';
    ctx.font = '8px Inter, sans-serif';
    ctx.textAlign = 'center';
    ids.forEach((id, i) => {
      if (i % 2 === 0) {
        const x = pad.left + (i / ids.length) * w + w / ids.length / 2;
        ctx.fillText(String(id).padStart(2,'0'), x, canvas.height - 6);
      }
    });
  }

  function drawCleaningChart(cleaningData, totalCabins) {
    const canvas = document.getElementById('cleaning-chart');
    if (!canvas) return;
    canvas.width  = canvas.offsetWidth || 600;
    canvas.height = 160;

    const ctx    = canvas.getContext('2d');
    const ids    = Array.from({ length: totalCabins }, (_, i) => i + 1);
    const values = ids.map(id => cleaningData[id] || 0);
    const max    = Math.max(...values, 30); // min max 30s göster

    const pad  = { top: 16, right: 16, bottom: 28, left: 36 };
    const w    = canvas.width  - pad.left - pad.right;
    const h    = canvas.height - pad.top  - pad.bottom;
    const barW = Math.max(2, w / ids.length - 4);

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // hedef çizgisi (20s)
    const targetY = pad.top + h * (1 - 20 / max);
    ctx.strokeStyle = 'rgba(76,175,110,0.3)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.moveTo(pad.left, targetY); ctx.lineTo(pad.left + w, targetY); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(76,175,110,0.4)';
    ctx.font = '8px Inter, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('target 20s', pad.left + 4, targetY - 3);

    // gridlines
    ctx.strokeStyle = '#1e1e1e';
    ctx.lineWidth = 1;
    [0, 0.5, 1].forEach(ratio => {
      const y = pad.top + h * (1 - ratio);
      ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + w, y); ctx.stroke();
    });

    // bars
    values.forEach((val, i) => {
      if (val === 0) return;
      const x     = pad.left + (i / ids.length) * w + (w / ids.length - barW) / 2;
      const barH  = (val / max) * h;
      const y     = pad.top + h - barH;
      // renk: iyi=yeşil, orta=sarı, yavaş=turuncu
      const color = val <= 20 ? 'rgba(76,175,110,0.8)' : val <= 25 ? 'rgba(200,200,60,0.8)' : 'rgba(200,146,42,0.9)';
      ctx.fillStyle = color;
      ctx.fillRect(x, y, barW, barH);
    });

    // x labels
    ctx.fillStyle = '#444';
    ctx.font = '8px Inter, sans-serif';
    ctx.textAlign = 'center';
    ids.forEach((id, i) => {
      if (i % 2 === 0) {
        const x = pad.left + (i / ids.length) * w + w / ids.length / 2;
        ctx.fillText(String(id).padStart(2,'0'), x, canvas.height - 6);
      }
    });

    // y labels
    ctx.fillStyle = '#333';
    ctx.textAlign = 'right';
    ctx.fillText('0', pad.left - 4, pad.top + h + 4);
    ctx.fillText(max + 's', pad.left - 4, pad.top + 10);
  }

  function drawCleaningCountChart(countData, totalCabins) {
    const canvas = document.getElementById('cleaning-count-chart');
    if (!canvas) return;
    canvas.width  = canvas.offsetWidth || 260;
    canvas.height = 160;

    const ctx    = canvas.getContext('2d');
    const ids    = Array.from({ length: totalCabins }, (_, i) => i + 1);
    const values = ids.map(id => countData[id] || 0);
    const max    = Math.max(...values, 1);

    const pad  = { top: 16, right: 16, bottom: 28, left: 28 };
    const w    = canvas.width  - pad.left - pad.right;
    const h    = canvas.height - pad.top  - pad.bottom;
    const barW = Math.max(2, w / ids.length - 3);

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    values.forEach((val, i) => {
      if (val === 0) return;
      const x     = pad.left + (i / ids.length) * w + (w / ids.length - barW) / 2;
      const barH  = (val / max) * h;
      const y     = pad.top + h - barH;
      const alpha = 0.3 + 0.7 * (val / max);
      ctx.fillStyle = `rgba(160,168,120,${alpha})`;
      ctx.fillRect(x, y, barW, barH);
    });

    ctx.fillStyle = '#444';
    ctx.font = '8px Inter, sans-serif';
    ctx.textAlign = 'center';
    ids.forEach((id, i) => {
      if (i % 2 === 0) {
        const x = pad.left + (i / ids.length) * w + w / ids.length / 2;
        ctx.fillText(String(id).padStart(2,'0'), x, canvas.height - 6);
      }
    });
  }

  // Pencere boyutu değişince chart'ları yeniden çiz
  window.addEventListener('resize', () => {
    if (analyticsData) renderDashboard();
  });

  // Cabin table'ı her 5 saniyede bir güncelle (dwell timer için)
  setInterval(() => {
    if (analyticsData) renderCabinTable(analyticsData);
  }, 5000);
</script>
