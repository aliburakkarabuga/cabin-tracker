<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fitting Rooms</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap');

    body {
      font-family: 'Cormorant Garamond', Georgia, serif;
      /* İçi karartmayan, aydınlık, temiz ve parlak kristal arka plan */
      background: radial-gradient(circle at 50% 30%, #ffffff 0%, #f4f7fa 100%);
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: none;
    }

    .screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      height: 92vh; 
      width: 100%;
      max-width: 400px; /* Geniş ekranlarda da dikey kule gibi zarif durması için */
      max-height: 820px;
      padding: 2.5rem 1.5rem 2rem;
      margin: auto;
    }

    .top { text-align: center; }

    .label {
      font-size: 12px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #64748b; /* Daha net, okunabilir gri */
      font-family: 'Inter', sans-serif;
      font-weight: 600;
    }

    .count {
      font-size: 116px;
      font-weight: 300;
      color: #0f172a;
      line-height: 1.1;
      margin: 8px 0;
      letter-spacing: -0.03em;
      transition: color 0.5s ease, transform 0.3s ease;
      font-variant-numeric: tabular-nums;
    }

    .count.pulse { transform: scale(1.08); }
    .count.zero { color: #ef4444; font-weight: 400; }

    .rule {
      width: 60px;
      height: 1.5px;
      background: linear-gradient(90deg, transparent, #cbd5e1, transparent);
      margin: 8px auto 0;
    }

    /* İstenmeyen arkadaki tüm kutular, gölgeler ve buzlu camlar tamamen temizlendi */
    .floorplan {
      position: relative;
      padding: 1rem 0;
      background: none;
      border-radius: 0;
      box-shadow: none;
      backdrop-filter: none;
    }
    .floorplan svg { display: block; }

    /* Canlı ve net mimari duvar çizgileri */
    .fp-wall {
      fill: #e2e8f0;
      stroke: #cbd5e1;
      stroke-width: 1.5;
    }
    
    .fp-floor {
      fill: #f1f5f9;
      stroke: #cbd5e1;
      stroke-width: 0.75;
    }

    /* Modern ve prestijli marka alanı */
    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .brand-city {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #94a3b8;
      font-weight: 600;
    }
    .store-name {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 32px;
      font-weight: 500;
      letter-spacing: 0.38em;
      color: #0f172a;
      text-transform: uppercase;
      text-align: center;
      padding-left: 0.38em;
    }

    .conn-dot {
      position: fixed;
      bottom: 1.2rem;
      right: 1.2rem;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #cbd5e1;
      transition: background 0.3s;
    }
    .conn-dot.connected   { background: #10b981; }
    .conn-dot.reconnecting { background: #f59e0b; animation: blink 1s infinite; }

    .fullscreen-hint {
      position: fixed;
      bottom: 1.2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #94a3b8;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      border: 1px solid #e2e8f0;
      border-radius: 4px;
      padding: 5px 10px;
      background: rgba(255,255,255,0.7);
      transition: all 0.2s;
    }
    .fullscreen-hint:hover { color: #475569; border-color: #cbd5e1; background: #fff; }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      z-index: 10;
    }
    .overlay.visible { display: flex; }
    .overlay p {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #64748b;
      font-family: 'Inter', sans-serif;
    }
    .overlay .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid #e2e8f0;
      border-top-color: #64748b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes spin  { to { transform: rotate(360deg); } }
    @keyframes cabinBlink { 0%,100%{opacity:1} 50%{opacity:0.75} }
  </style>
</head>

<div class="conn-dot" id="conn-dot"></div>
<div class="fullscreen-hint" onclick="goFullscreen()">Fullscreen · F</div>

<script>
  // ─── CONFIG ──────────────────────────────────────────────────────────────────
  const params     = new URLSearchParams(window.location.search);
  const STORE_ID   = params.get('store') || 'store-001';
  const WS_URL     = `${window.location.protocol === 'https:' ? 'wss' : 'ws'}://${window.location.host}?store=${STORE_ID}`;

  let CLEARING_DURATION_MS = 30 * 1000;
  fetch('/api/config').then(r => r.json()).then(cfg => {
    if (cfg.clearingToEmptyMs) CLEARING_DURATION_MS = cfg.clearingToEmptyMs;
  }).catch(() => {});

  // YENİ CANLI VE ENERJİK RENK PALETİ
  const FILLS   = { 
    empty: '#10b981',    /* Canlı Zümrüt Yeşili (Boş/Müsait) */
    full: '#1e3a8a',     /* Derin Safir Mavisi (Dolu) */
    clearing: '#f59e0b'  /* Enerjik Altın Sarısı (Temizleniyor) */
  };
  const STROKES = { 
    empty: '#059669', 
    full: '#172554', 
    clearing: '#d97706' 
  };

  // ─── STATE ───────────────────────────────────────────────────────────────────
  let cabins       = [];
  let ws           = null;
  let retryTimeout = null;
  let retryDelay   = 1000;
  const timerEndsAt = {};

  // ─── UI ──────────────────────────────────────────────────────────────────────
  const dot       = document.getElementById('conn-dot');
  const overlay   = document.getElementById('overlay');
  const countEl   = document.getElementById('count');
  const storeEl   = document.getElementById('store-name');

  function goFullscreen() {
    document.documentElement.requestFullscreen().catch(() => {});
  }
  document.addEventListener('keydown', e => {
    if (e.key === 'f' || e.key === 'F') goFullscreen();
  });

  function setConnected(state) {
    dot.className = 'conn-dot' + (state === 'connected' ? ' connected' : state === 'reconnecting' ? ' reconnecting' : '');
    overlay.classList.toggle('visible', state !== 'connected');
  }

  function updateCount() {
    const free = cabins.filter(c => c.state === 'empty').length;
    if (countEl.textContent !== String(free) && countEl.textContent !== '—') {
      countEl.classList.add('pulse');
      setTimeout(() => countEl.classList.remove('pulse'), 300);
    }
    countEl.textContent = free;
    countEl.classList.toggle('zero', free === 0);
  }

  function applyState(id, state) {
    const rect  = document.getElementById(`r${id}`);
    const timer = document.getElementById(`t${id}`);
    if (!rect) return;

    rect.setAttribute('fill',   FILLS[state]);
    rect.setAttribute('stroke', STROKES[state]);

    if (state === 'clearing') {
      rect.style.animation = 'cabinBlink 1.2s ease-in-out infinite';
      timerEndsAt[id] = Date.now() + CLEARING_DURATION_MS;
    } else {
      rect.style.animation = '';
      delete timerEndsAt[id];
      if (timer) timer.textContent = '';
    }
    updateCount();
  }

  function renderAll() {
    cabins.forEach(c => applyState(c.id, c.state));
  }

  setInterval(() => {
    const now = Date.now();
    Object.keys(timerEndsAt).forEach(id => {
      const remaining = Math.max(0, timerEndsAt[id] - now);
      const el = document.getElementById(`t${id}`);
      if (el) el.textContent = remaining > 0 ? `${Math.ceil(remaining / 1000)}s` : '';
    });
  }, 500);

  // ─── WEBSOCKET ───────────────────────────────────────────────────────────────
  function connect() {
    if (!window.location.host) {
      setConnected('reconnecting');
      overlay.querySelector('p').textContent = 'Open via http://localhost:3000/kiosk';
      return;
    }

    if (ws) { ws.onclose = null; ws.close(); }

    try {
      ws = new WebSocket(WS_URL);
    } catch (err) {
      console.error(err);
      setConnected('reconnecting');
      scheduleRetry();
      return;
    }

    ws.onopen = () => {
      retryDelay = 1000;
      setConnected('connected');
    };

    ws.onmessage = (event) => {
      try {
        const data = JSON.parse(event.data);
        if (data.type === 'init') {
          cabins = data.cabins;
          if (data.storeName) storeEl.textContent = data.storeName;
          if (data.clearingToEmptyMs) CLEARING_DURATION_MS = data.clearingToEmptyMs;
          renderAll();
        }
        if (data.type === 'update') {
          const cabin = cabins.find(c => c.id === data.id);
          if (cabin) cabin.state = data.state;
          applyState(data.id, data.state);
        }
      } catch (err) {
        console.error(err);
      }
    };

    ws.onclose = () => {
      setConnected('reconnecting');
      scheduleRetry();
    };

    ws.onerror = () => { ws.close(); };
  }

  function scheduleRetry() {
    clearTimeout(retryTimeout);
    retryTimeout = setTimeout(() => {
      connect();
      retryDelay = Math.min(retryDelay * 2, 16000);
    }, retryDelay);
  }

  connect();
</script>
