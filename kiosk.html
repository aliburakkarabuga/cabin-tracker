<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fitting Rooms</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap');

    body {
      font-family: 'Cormorant Garamond', Georgia, serif;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(255,255,255,0.9), transparent),
        linear-gradient(180deg, #eef2f7 0%, #e3e9f1 100%);
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: none;
    }

    .screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      height: 90vh;
      max-height: 720px;
      padding: 2.5rem 1.5rem 2rem;
    }

    .top { text-align: center; }

    .label {
      font-size: 11px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: #8a94a3;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
    }

    .count {
      font-size: 108px;
      font-weight: 300;
      color: #14181f;
      line-height: 1;
      margin: 10px 0;
      letter-spacing: -0.02em;
      transition: color 0.5s ease, transform 0.3s ease;
      font-variant-numeric: tabular-nums;
    }

    .count.pulse { transform: scale(1.06); }
    .count.zero { color: #b3432f; }

    .rule {
      width: 44px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #b8c2d0, transparent);
      margin: 6px auto 0;
    }

    .floorplan {
      position: relative;
      padding: 1.75rem 2.25rem;
      background: rgba(255,255,255,0.55);
      border-radius: 18px;
      box-shadow:
        0 1px 2px rgba(20,24,31,0.04),
        0 12px 32px -12px rgba(20,24,31,0.14),
        inset 0 1px 0 rgba(255,255,255,0.8);
      backdrop-filter: blur(6px);
    }
    .floorplan svg { display: block; }

    /* Brand wordmark — stylised standalone treatment, not the trademarked
       DEFACTO logotype itself (that's proprietary brand IP), just a
       premium-retail-feeling presentation of the store name. */
    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .brand-city {
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #9aa4b2;
      font-weight: 500;
    }
    .store-name {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 30px;
      font-weight: 500;
      letter-spacing: 0.42em;
      color: #14181f;
      text-transform: uppercase;
      text-align: center;
      min-height: 34px;
      padding-left: 0.42em; /* compensate trailing letter-spacing so it stays centered */
    }

    /* Connection dot — sağ alt */
    .conn-dot {
      position: fixed;
      bottom: 1.1rem;
      right: 1.1rem;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #c7cfda;
      box-shadow: 0 0 0 3px rgba(0,0,0,0.02);
      transition: background 0.3s;
    }
    .conn-dot.connected   { background: #2f7a4d; }
    .conn-dot.reconnecting { background: #d99a2b; animation: blink 1s infinite; }

    /* Fullscreen hint */
    .fullscreen-hint {
      position: fixed;
      bottom: 1.1rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #aab3c0;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      border: 0.5px solid #ccd4de;
      border-radius: 3px;
      padding: 6px 12px;
      background: rgba(255,255,255,0.4);
      transition: color 0.2s, border-color 0.2s;
    }
    .fullscreen-hint:hover { color: #667; border-color: #aab3c0; }

    /* Reconnect overlay */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(238, 242, 247, 0.9);
      backdrop-filter: blur(3px);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      z-index: 10;
      text-align: center;
      padding: 0 2rem;
    }
    .overlay.visible { display: flex; }
    .overlay p {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #8a94a3;
      font-family: 'Inter', sans-serif;
      max-width: 320px;
    }
    .overlay .spinner {
      width: 22px;
      height: 22px;
      border: 1.5px solid #d5dbe3;
      border-top-color: #8a94a3;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes spin  { to { transform: rotate(360deg); } }
  </style>
</head>

<!-- Reconnect overlay -->
<div class="overlay" id="overlay">
  <div class="spinner"></div>
  <p>Reconnecting…</p>
</div>

<div class="conn-dot" id="conn-dot"></div>
<div class="fullscreen-hint" onclick="goFullscreen()">Fullscreen · F</div>

<script>
  // ─── CONFIG ──────────────────────────────────────────────────────────────────
  // URL param ile override edilebilir: kiosk.html?store=store-002
  const params     = new URLSearchParams(window.location.search);
  const STORE_ID   = params.get('store') || 'store-001';
  const WS_URL     = `${window.location.protocol === 'https:' ? 'wss' : 'ws'}://${window.location.host}?store=${STORE_ID}`;

  // Fallback only — the real value is fetched from /api/config (and also
  // arrives on every WS `init` message), so this never drifts from the
  // server's config.json if someone changes the timer duration there.
  let CLEARING_DURATION_MS = 30 * 1000;
  fetch('/api/config').then(r => r.json()).then(cfg => {
    if (cfg.clearingToEmptyMs) CLEARING_DURATION_MS = cfg.clearingToEmptyMs;
  }).catch(() => {});

  const FILLS   = { empty: '#5c8a6e', full: '#3f4f68', clearing: '#a89768' };
  const STROKES = { empty: '#4a7159', full: '#333f54', clearing: '#8a7c56' };

  // ─── STATE ───────────────────────────────────────────────────────────────────
  let cabins       = [];
  let ws           = null;
  let retryTimeout = null;
  let retryDelay   = 1000;       // ilk retry 1s, her seferinde 2x artar, max 16s
  const timerEndsAt = {};

  // ─── UI ──────────────────────────────────────────────────────────────────────
  const dot       = document.getElementById('conn-dot');
  const overlay   = document.getElementById('overlay');
  const countEl   = document.getElementById('count');
  const storeEl   = document.getElementById('store-name');

  function goFullscreen() {
    document.documentElement.requestFullscreen().catch(() => {});
  }
  document.addEventListener('keydown', e => {
    if (e.key === 'f' || e.key === 'F') goFullscreen();
  });

  function setConnected(state) {
    // state: 'connected' | 'reconnecting' | 'disconnected'
    dot.className = 'conn-dot' + (state === 'connected' ? ' connected' : state === 'reconnecting' ? ' reconnecting' : '');
    overlay.classList.toggle('visible', state !== 'connected');
  }

  function updateCount() {
    const free = cabins.filter(c => c.state === 'empty').length;
    if (countEl.textContent !== String(free) && countEl.textContent !== '—') {
      countEl.classList.add('pulse');
      setTimeout(() => countEl.classList.remove('pulse'), 300);
    }
    countEl.textContent = free;
    countEl.classList.toggle('zero', free === 0);
  }

  function applyState(id, state) {
    const rect  = document.getElementById(`r${id}`);
    const timer = document.getElementById(`t${id}`);
    if (!rect) return;

    rect.setAttribute('fill',   FILLS[state]);
    rect.setAttribute('stroke', STROKES[state]);

    if (state === 'clearing') {
      rect.style.animation = 'blink 1.5s ease-in-out infinite';
      timerEndsAt[id] = Date.now() + CLEARING_DURATION_MS;
    } else {
      rect.style.animation = '';
      delete timerEndsAt[id];
      if (timer) timer.textContent = '';
    }
    updateCount();
  }

  function renderAll() {
    cabins.forEach(c => applyState(c.id, c.state));
  }

  // Countdown timer (clearing state)
  setInterval(() => {
    const now = Date.now();
    Object.keys(timerEndsAt).forEach(id => {
      const remaining = Math.max(0, timerEndsAt[id] - now);
      const el = document.getElementById(`t${id}`);
      if (el) el.textContent = remaining > 0 ? `${Math.ceil(remaining / 1000)}s` : '';
    });
  }, 500);

  // ─── WEBSOCKET w/ RECONNECT ───────────────────────────────────────────────────
  function connect() {
    if (!window.location.host) {
      // Opened as a local file (file://) instead of served by the Node
      // server — WebSocket has no host to connect to and the API fetch
      // above will have failed too. Fail loudly instead of silently
      // freezing on the placeholder "—".
      setConnected('reconnecting');
      overlay.querySelector('p').textContent = 'Open via http://localhost:3000/kiosk — not as a local file';
      return;
    }

    if (ws) { ws.onclose = null; ws.close(); }

    try {
      ws = new WebSocket(WS_URL);
    } catch (err) {
      console.error('WebSocket construction failed:', err);
      setConnected('reconnecting');
      scheduleRetry();
      return;
    }

    ws.onopen = () => {
      retryDelay = 1000; // başarılı bağlantıda sıfırla
      setConnected('connected');
    };

    ws.onmessage = (event) => {
      try {
        const data = JSON.parse(event.data);

        if (data.type === 'init') {
          cabins = data.cabins;
          if (data.storeName) storeEl.textContent = data.storeName;
          if (data.clearingToEmptyMs) CLEARING_DURATION_MS = data.clearingToEmptyMs;
          renderAll();
        }

        if (data.type === 'update') {
          const cabin = cabins.find(c => c.id === data.id);
          if (cabin) cabin.state = data.state;
          applyState(data.id, data.state);
        }
      } catch (err) {
        console.error('Parse error:', err);
      }
    };

    ws.onclose = () => {
      setConnected('reconnecting');
      scheduleRetry();
    };

    ws.onerror = () => {
      ws.close(); // onclose tetiklenecek, retry oradan
    };
  }

  function scheduleRetry() {
    clearTimeout(retryTimeout);
    retryTimeout = setTimeout(() => {
      connect();
      retryDelay = Math.min(retryDelay * 2, 16000); // exponential backoff, max 16s
    }, retryDelay);
  }

  // ─── BOOT ─────────────────────────────────────────────────────────────────────
  connect();
</script>
</body>
</html>
