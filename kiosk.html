<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fitting Rooms</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;300&display=swap');

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #e8eff3;
      color: #000000;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 5vh 0 4.5vh;
      overflow: hidden;
      user-select: none;
    }

    /* Üst Alan: Minimalist Sayaç Bölümü */
    .top-counter {
      width: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.22rem;
    }

    .label-top, .label-bottom {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.92rem;
      font-weight: 100;
      letter-spacing: 0.26em;
      color: #5a656e;
      text-transform: uppercase;
      line-height: 1.1;
    }

    .count {
      display: block;
      width: 100%;
      font-size: 8.15rem;
      font-weight: 100;
      color: #000000;
      line-height: 0.82;
      margin: 0.08rem 0 0.14rem;
      letter-spacing: -0.08em;
      padding-right: 0.08em;
      font-variant-numeric: tabular-nums;
    }

    /* Orta Alan: Kat Planı Konteyneri */
    .floorplan-wrapper {
      flex: 1;
      min-height: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .floorplan-svg {
      max-width: min(78vw, 430px);
      max-height: 86%;
      width: auto;
      height: auto;
      display: block;
      margin: 3.5vh 0;
      overflow: visible;
    }

    /* Mimari Çizgiler */
    .fp-wall {
      fill: none;
      stroke: #b7c2cb;
      stroke-width: 1;
    }

    /* Kabin Kutuları */
    .cabin-rect {
      transition: fill 0.3s ease;
      stroke: #f3f7fb;
      stroke-width: 1.25;
      shape-rendering: geometricPrecision;
    }

    /* Numaralar: İnce ve Keskin */
    .fp-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 8.8px;
      font-weight: 300;
      fill: #4a535c;
      letter-spacing: 0.06em;
    }

    .countdown-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 9.5px;
      font-weight: 600;
      fill: #6b5300;
      pointer-events: none;
    }

    .you-are-here {
      font-family: 'Montserrat', sans-serif;
      font-size: 7px;
      fill: #7d8b96;
      letter-spacing: 0.16em;
      font-weight: 300;
    }

    /* Alt Alan: Didot Benzeri Wordmark */
    .brand-footer {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .zara-logo {
      font-family: "Didot", "Bodoni MT", "Times New Roman", serif;
      font-size: 5.1rem;
      font-weight: 500;
      letter-spacing: -0.12em;
      line-height: 0.78;
      color: #000000;
      text-transform: uppercase;
      transform: scaleX(0.86);
      display: inline-block;
      white-space: nowrap;
    }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #e8eff3;
      z-index: 10;
    }
    .overlay.visible { display: flex; }
    .conn-dot { position: fixed; bottom: 10px; right: 10px; width: 4px; height: 4px; border-radius: 50%; }
    @keyframes cabinBlink { 0%,100%{opacity:1} 50%{opacity:0.4} }
  </style>
</head>
<body>

  <div class="top-counter">
    <div class="label-top">AVAILABLE</div>
    <div class="count" id="count">—</div>
    <div class="label-bottom">FREE ROOMS</div>
  </div>

  <div class="floorplan-wrapper">
    <svg class="floorplan-svg" viewBox="0 0 260 320" xmlns="http://www.w3.org/2000/svg">
      <g transform="translate(-36, 0)">
      <!-- Dış Duvar: Kabinlerin hemen altında düz kesim -->
      <path class="fp-wall" d="M 96 8 L 96 256 L 233 256 L 226 8 Z" />

      <!-- Sol Sıra Kabinleri (13 - 7) -->
      <g id="left-cabins">
        <rect id="r13" class="cabin-rect" fill="#c9d3da" x="100" y="16" width="34" height="30" />
        <text x="140" y="35" class="fp-label">13</text>
        <text id="ctd13" class="countdown-label" x="117" y="34" text-anchor="middle"></text>

        <rect id="r12" class="cabin-rect" fill="#c9d3da" x="100" y="50" width="34" height="30" />
        <text x="140" y="69" class="fp-label">12</text>
        <text id="ctd12" class="countdown-label" x="117" y="68" text-anchor="middle"></text>

        <rect id="r11" class="cabin-rect" fill="#c9d3da" x="100" y="84" width="34" height="30" />
        <text x="140" y="103" class="fp-label">11</text>
        <text id="ctd11" class="countdown-label" x="117" y="102" text-anchor="middle"></text>

        <rect id="r10" class="cabin-rect" fill="#c9d3da" x="100" y="118" width="34" height="30" />
        <text x="140" y="137" class="fp-label">10</text>
        <text id="ctd10" class="countdown-label" x="117" y="136" text-anchor="middle"></text>

        <rect id="r09" class="cabin-rect" fill="#c9d3da" x="100" y="152" width="34" height="30" />
        <text x="140" y="171" class="fp-label">9</text>
        <text id="ctd09" class="countdown-label" x="117" y="170" text-anchor="middle"></text>

        <rect id="r08" class="cabin-rect" fill="#c9d3da" x="100" y="186" width="34" height="30" />
        <text x="140" y="205" class="fp-label">8</text>
        <text id="ctd08" class="countdown-label" x="117" y="204" text-anchor="middle"></text>

        <rect id="r07" class="cabin-rect" fill="#c9d3da" x="100" y="220" width="34" height="30" />
        <text x="140" y="239" class="fp-label">7</text>
        <text id="ctd07" class="countdown-label" x="117" y="238" text-anchor="middle"></text>
      </g>

      <!-- Sağ Sıra Kabinleri (1 - 6), düz hizalı sütun, yukarıdan başlıyor -->
      <g id="right-cabins">
        <rect id="r01" class="cabin-rect" fill="#c9d3da" x="188" y="16" width="30" height="28" />
        <text x="228" y="34" class="fp-label">1</text>
        <text id="ctd01" class="countdown-label" x="203" y="33" text-anchor="middle"></text>

        <rect id="r02" class="cabin-rect" fill="#c9d3da" x="188" y="48" width="30" height="28" />
        <text x="228" y="66" class="fp-label">2</text>
        <text id="ctd02" class="countdown-label" x="203" y="65" text-anchor="middle"></text>

        <rect id="r03" class="cabin-rect" fill="#c9d3da" x="188" y="80" width="30" height="28" />
        <text x="228" y="98" class="fp-label">3</text>
        <text id="ctd03" class="countdown-label" x="203" y="97" text-anchor="middle"></text>

        <rect id="r04" class="cabin-rect" fill="#c9d3da" x="188" y="112" width="30" height="28" />
        <text x="228" y="130" class="fp-label">4</text>
        <text id="ctd04" class="countdown-label" x="203" y="129" text-anchor="middle"></text>

        <rect id="r05" class="cabin-rect" fill="#c9d3da" x="188" y="144" width="30" height="28" />
        <text x="228" y="162" class="fp-label">5</text>
        <text id="ctd05" class="countdown-label" x="203" y="161" text-anchor="middle"></text>

        <rect id="r06" class="cabin-rect" fill="#c9d3da" x="188" y="176" width="30" height="28" />
        <text x="228" y="194" class="fp-label">6</text>
        <text id="ctd06" class="countdown-label" x="203" y="193" text-anchor="middle"></text>
      </g>

      <!-- Giriş Yazısı -->
      <text x="166" y="298" class="you-are-here" text-anchor="middle">YOU ARE HERE</text>
      </g>
    </svg>
  </div>

  <!-- Tek Parça Düz Metin Alanı -->
  <div class="brand-footer">
    <div class="zara-logo">ZARA</div>
  </div>

  <div class="overlay" id="overlay"></div>
  <div class="conn-dot" id="conn-dot"></div>

<script>
  const params   = new URLSearchParams(window.location.search);
  const STORE_ID = params.get('store') || 'store-001';
  const WS_URL   = `${window.location.protocol === 'https:' ? 'wss' : 'ws'}://${window.location.host}?store=${STORE_ID}`;

  const FILLS = { 
    empty: '#9fe3be',
    full: '#8fa0b0',
    clearing: '#f2e2a8'
  };

  let cabins = [];
  let ws = null;
  let CLEARING_SECONDS = 10;
  const countdownTimers = {};

  fetch('/api/config').then(r => r.json()).then(cfg => {
    if (cfg && cfg.clearingToEmptyMs) {
      CLEARING_SECONDS = Math.round(cfg.clearingToEmptyMs / 1000);
    }
  }).catch(() => {});

  const countEl = document.getElementById('count');
  const overlay = document.getElementById('overlay');

  function updateCount() {
    const free = cabins.filter(c => c.state === 'empty').length;
    countEl.textContent = free;
  }

  function startCountdown(paddedId) {
    stopCountdown(paddedId);
    const label = document.getElementById(`ctd${paddedId}`);
    if (!label) return;
    let remaining = CLEARING_SECONDS;
    label.textContent = remaining;
    countdownTimers[paddedId] = setInterval(() => {
      remaining -= 1;
      if (remaining <= 0) {
        stopCountdown(paddedId);
      } else {
        label.textContent = remaining;
      }
    }, 1000);
  }

  function stopCountdown(paddedId) {
    if (countdownTimers[paddedId]) {
      clearInterval(countdownTimers[paddedId]);
      delete countdownTimers[paddedId];
    }
    const label = document.getElementById(`ctd${paddedId}`);
    if (label) label.textContent = '';
  }

  function applyState(id, state) {
    const num = parseInt(id, 10);
    if (isNaN(num)) return;
    const paddedId = num < 10 ? `0${num}` : `${num}`;
    const rect = document.getElementById(`r${paddedId}`);
    if (!rect) return;

    rect.setAttribute('fill', FILLS[state]);
    if (state === 'clearing') {
      rect.style.animation = 'cabinBlink 1.2s ease-in-out infinite';
      startCountdown(paddedId);
    } else {
      rect.style.animation = '';
      stopCountdown(paddedId);
    }
    updateCount();
  }

  function renderAll() {
    cabins.forEach(c => applyState(c.id, c.state));
  }

  function connect() {
    if (!window.location.host) return;
    try {
      ws = new WebSocket(WS_URL);
    } catch (e) {
      setTimeout(connect, 2000);
      return;
    }

    ws.onopen = () => overlay.classList.remove('visible');
    
    ws.onmessage = (event) => {
      try {
        const data = JSON.parse(event.data);
        if (data.type === 'init') {
          cabins = data.cabins;
          renderAll();
        }
        if (data.type === 'update') {
          const cabin = cabins.find(c => parseInt(c.id, 10) === parseInt(data.id, 10));
          if (cabin) cabin.state = data.state;
          applyState(data.id, data.state);
        }
      } catch (err) {}
    };

    ws.onclose = () => {
      overlay.classList.add('visible');
      setTimeout(connect, 2000);
    };
    ws.onerror = () => ws.close();
  }

  connect();
</script>
</body>
</html>
