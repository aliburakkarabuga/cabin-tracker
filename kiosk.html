<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fitting Rooms</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* Zara uses Helvetica Neue or a very clean, light sans-serif */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap');

    body {
      font-family: 'Helvetica Neue', Helvetica, 'Inter', Arial, sans-serif;
      background: #e1ecf4; /* Subtle desaturated soft blue background matching the image */
      color: #000000;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: none;
      -webkit-font-smoothing: antialiased;
    }

    .screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      height: 90vh; 
      width: 100%;
      max-width: 420px;
      max-height: 860px;
      padding: 3rem 1.5rem 2rem;
      margin: auto;
    }

    .top { 
      text-align: center; 
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .label-top {
      font-size: 26px;
      font-weight: 200;
      letter-spacing: 0.12em;
      color: #333333;
      text-transform: uppercase;
      line-height: 1.2;
    }

    .count {
      font-size: 110px;
      font-weight: 200;
      color: #000000;
      line-height: 0.95;
      margin: 4px 0 2px 0;
      letter-spacing: -0.01em;
      font-variant-numeric: tabular-nums;
    }

    .label-bottom {
      font-size: 24px;
      font-weight: 200;
      letter-spacing: 0.12em;
      color: #333333;
      text-transform: uppercase;
      line-height: 1.2;
    }

    .floorplan {
      position: relative;
      flex-grow: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 1rem 0;
    }
    .floorplan svg { display: block; }

    /* Ultra-thin architectural lines matching the ZARA terminal screen */
    .fp-wall {
      fill: none;
      stroke: #7f95a5;
      stroke-width: 0.6;
    }
    
    .fp-text {
      font-family: 'Helvetica Neue', Helvetica, 'Inter', Arial, sans-serif;
      font-size: 5px;
      fill: #596b79;
      font-weight: 400;
    }

    .brand {
      margin-top: 1rem;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    /* ZARA Logotype emulation (Tight overlapping serif typography) */
    .zara-logo {
      font-family: 'Didot', 'Bodoni MT', 'Cormorant Garamond', serif;
      font-size: 42px;
      font-weight: 400;
      letter-spacing: -0.08em;
      color: #000000;
      text-transform: uppercase;
      transform: scaleX(0.95);
    }
    .zara-logo span {
      margin-right: -0.05em;
    }

    .conn-dot {
      position: fixed;
      bottom: 1.2rem;
      right: 1.2rem;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: transparent;
      transition: background 0.3s;
    }
    .conn-dot.connected   { background: transparent; }
    .conn-dot.reconnecting { background: #7f95a5; animation: blink 1s infinite; }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #e1ecf4;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .overlay.visible { display: flex; }
    .overlay p {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #7f95a5;
      font-weight: 300;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes cabinBlink { 0%,100%{opacity:1} 50%{opacity:0.5} }
  </style>
</head>
<body>

<div class="screen">
  <div class="top">
    <p class="label-top">AVAILABLE</p>
    <p class="count" id="count">—</p>
    <p class="label-bottom">FREE ROOMS</p>
  </div>

  <div class="floorplan">
    <!-- Exactly maps the 19 cabins and architectural layout of the uploaded image -->
    <svg id="fp" viewBox="0 0 160 360" width="160" xmlns="http://www.w3.org/2000/svg">
      <!-- Outer structural boundary lines -->
      <polyline class="fp-wall" points="40,30 115,30 138,285 138,300" />
      <polyline class="fp-wall" points="32,30 32,295 72,295 72,305 48,305 48,312" />
      <line class="fp-wall" x1="58" y1="312" x2="58" y2="324" />
      <polyline class="fp-wall" points="40,324 82,324 82,318 128,318 128,335" />

      <!-- Left Cabin Row Group (Cabins 02 to 19 - even/odd alignment matching layout) -->
      <!-- Green fill: #72db9d, Busy fill: #718fae, Clearing fill: #ccebda -->
      <!-- Injected rects are completely sharp with no border strokes inside the architectural block -->
      <g id="left-cabins">
        <!-- 19 --> <rect id="r19" x="42" y="34" width="22" height="20" /> <text class="fp-text" x="69" y="46">19</text>
        <!-- 18 --> <rect id="r18" x="42" y="57" width="22" height="20" /> <text class="fp-text" x="69" y="69">18</text>
        <!-- 17 --> <rect id="r17" x="42" y="80" width="22" height="20" /> <text class="fp-text" x="69" y="92">17</text>
        <!-- 16 --> <rect id="r16" x="42" y="103" width="22" height="20" /> <text class="fp-text" x="69" y="115">16</text>
        <!-- 15 --> <rect id="r15" x="42" y="126" width="22" height="20" /> <text class="fp-text" x="69" y="138">15</text>
        <!-- 14 --> <rect id="r14" x="42" y="149" width="22" height="20" /> <text class="fp-text" x="69" y="161">14</text>
        <!-- 12 --> <rect id="r12" x="42" y="172" width="22" height="20" /> <text class="fp-text" x="69" y="184">12</text>
        <!-- 10 --> <rect id="r10" x="42" y="195" width="22" height="20" /> <text class="fp-text" x="69" y="207">10</text>
        <!-- 08 --> <rect id="r8"  x="42" y="218" width="22" height="20" /> <text class="fp-text" x="69" y="230">08</text>
        <!-- 06 --> <rect id="r6"  x="42" y="241" width="22" height="20" /> <text class="fp-text" x="69" y="253">06</text>
        <!-- 04 --> <rect id="r4"  x="42" y="264" width="22" height="20" /> <text class="fp-text" x="69" y="276">04</text>
        <!-- 02 --> <rect id="r2"  x="42" y="287" width="22" height="8" />  <text class="fp-text" x="69" y="293">02</text>
      </g>

      <!-- Right Cabin Row Group -->
      <g id="right-cabins">
        <!-- 13 --> <rect id="r13" x="98" y="176" width="20" height="18" /> <text class="fp-text" x="84" y="188">13</text>
        <!-- 11 --> <rect id="r11" x="98" y="197" width="20" height="18" /> <text class="fp-text" x="84" y="209">11</text>
        <!-- 09 --> <rect id="r9"  x="98" y="218" width="20" height="18" /> <text class="fp-text" x="84" y="230">09</text>
        <!-- 07 --> <rect id="r7"  x="98" y="239" width="20" height="18" /> <text class="fp-text" x="84" y="251">07</text>
        <!-- 05 --> <rect id="r5"  x="98" y="260" width="28" height="26" /> <text class="fp-text" x="84" y="275">05</text>
        <!-- 03 --> <rect id="r3"  x="98" y="289" width="20" height="18" /> <text class="fp-text" x="84" y="301">03</text>
        <!-- 01 --> <rect id="r1"  x="98" y="310" width="20" height="18" /> <text class="fp-text" x="84" y="322">01</text>
      </g>

      <!-- You are here indicator label -->
      <text x="32" y="318" font-size="4" fill="#7f95a5" font-family="Inter, sans-serif" font-weight="400" letter-spacing="0.02em">YOU ARE HERE</text>
    </svg>
  </div>

  <div class="brand">
    <div class="zara-logo">Z<span>A</span>R<span>A</span></div>
  </div>
</div>

<div class="overlay" id="overlay">
  <p>Connecting</p>
</div>

<div class="conn-dot" id="conn-dot"></div>

<script>
  const params     = new URLSearchParams(window.location.search);
  const STORE_ID   = params.get('store') || 'store-001';
  const WS_URL     = `${window.location.protocol === 'https:' ? 'wss' : 'ws'}://${window.location.host}?store=${STORE_ID}`;

  let CLEARING_DURATION_MS = 30 * 1000;
  fetch('/api/config').then(r => r.json()).then(cfg => {
    if (cfg.clearingToEmptyMs) CLEARING_DURATION_MS = cfg.clearingToEmptyMs;
  }).catch(() => {});

  /* Exact color matching from the Zara panel photo provided */
  const FILLS = { 
    empty: '#72db9d',     /* Perfect soft vibrant pastel green */
    full: '#718fae',      /* The precise desaturated slate blue/gray */
    clearing: '#ccebda'   /* Muted fade green for cleaning stage */
  };

  let cabins       = [];
  let ws           = null;
  let retryTimeout = null;
  let retryDelay   = 1000;

  const dot       = document.getElementById('conn-dot');
  const overlay   = document.getElementById('overlay');
  const countEl   = document.getElementById('count');

  function goFullscreen() {
    document.documentElement.requestFullscreen().catch(() => {});
  }
  document.addEventListener('keydown', e => {
    if (e.key === 'f' || e.key === 'F') goFullscreen();
  });
  // Auto-request fullscreen on click anywhere to act as a proper display kiosk
  document.addEventListener('click', () => goFullscreen());

  function setConnected(state) {
    dot.className = 'conn-dot' + (state === 'connected' ? ' connected' : state === 'reconnecting' ? ' reconnecting' : '');
    overlay.classList.toggle('visible', state !== 'connected');
  }

  function updateCount() {
    const free = cabins.filter(c => c.state === 'empty').length;
    countEl.textContent = free;
  }

  function applyState(id, state) {
    const rect = document.getElementById(`r${id}`);
    if (!rect) return;

    rect.setAttribute('fill', FILLS[state]);

    if (state === 'clearing') {
      rect.style.animation = 'cabinBlink 1.5s ease-in-out infinite';
    } else {
      rect.style.animation = '';
    }
    updateCount();
  }

  function renderAll() {
    cabins.forEach(c => applyState(c.id, c.state));
  }

  function connect() {
    if (!window.location.host) {
      setConnected('reconnecting');
      return;
    }

    if (ws) { ws.onclose = null; ws.close(); }

    try {
      ws = new WebSocket(WS_URL);
    } catch (err) {
      console.error(err);
      setConnected('reconnecting');
      scheduleRetry();
      return;
    }

    ws.onopen = () => {
      retryDelay = 1000;
      setConnected('connected');
    };

    ws.onmessage = (event) => {
      try {
        const data = JSON.parse(event.data);
        if (data.type === 'init') {
          cabins = data.cabins;
          if (data.clearingToEmptyMs) CLEARING_DURATION_MS = data.clearingToEmptyMs;
          renderAll();
        }
        if (data.type === 'update') {
          const cabin = cabins.find(c => c.id === data.id);
          if (cabin) cabin.state = data.state;
          applyState(data.id, data.state);
        }
      } catch (err) {
        console.error(err);
      }
    };

    ws.onclose = () => {
      setConnected('reconnecting');
      scheduleRetry();
    };

    ws.onerror = () => { ws.close(); };
  }

  function scheduleRetry() {
    clearTimeout(retryTimeout);
    retryTimeout = setTimeout(() => {
      connect();
      retryDelay = Math.min(retryDelay * 2, 16000);
    }, retryDelay);
  }

  connect();
</script>
</body>
</html>
