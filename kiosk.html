<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fitting Rooms</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap');

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #e8eff3;
      color: #000000;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 3vh 2vw;
      overflow: hidden;
      user-select: none;
    }

    /* Üst Alan: Büyük Sayaç */
    .top-counter {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .label-top, .label-bottom {
      font-size: 2.2rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: #434c54;
      text-transform: uppercase;
    }

    .count {
      font-size: 11rem;
      font-weight: 200;
      color: #000000;
      line-height: 0.9;
      margin: 0.5vh 0;
      font-variant-numeric: tabular-nums;
    }

    /* Orta Alan: Mağaza Planı Konteyneri (Ekrana Göre Esnek Büyür) */
    .floorplan-wrapper {
      flex: 1;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      margin: 2vh 0;
    }

    /* Ana Kroki Çerçevesi (Görseldeki gibi ince çizgili mimari plan) */
    .map-frame {
      border: 1.5px solid #7f95a5;
      padding: 20px 20px 10px 20px;
      width: 100%;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Görseldeki üstten daralan asimetrik mimari çizgiyi simüle eden köşe kırığı */
    .map-frame::before {
      content: '';
      position: absolute;
      top: -2px;
      right: -2px;
      width: 40px;
      height: 120px;
      background: #e8eff3;
      border-bottom: 1.5px solid #7f95a5;
      transform: rotate(15deg);
      transform-origin: top right;
      z-index: 1;
    }

    /* Kabin Bloklarının Düzeni */
    .columns-container {
      display: flex;
      justify-content: space-between;
      width: 100%;
      z-index: 2;
    }

    /* Sol Sıra: 10 Tane Dikey Dizili Kabin (04-13) */
    .left-column {
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 38%;
    }

    /* Sağ Sıra: Görseldeki gibi daha aşağıdan başlayan bloklar (01-03) */
    .right-column {
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 38%;
      margin-top: auto; /* Sağ bloğu aşağıya yasla */
      padding-bottom: 30px;
    }

    /* Her bir Kabin Kutusu */
    .cabin-box {
      display: flex;
      align-items: center;
      width: 100%;
      height: 4.2vh;
      min-height: 28px;
    }

    .left-column .cabin-box {
      flex-direction: row;
    }

    .right-column .cabin-box {
      flex-direction: row-reverse; /* Sağ sıranın numaraları içe (sola) baksın */
    }

    /* Kabinin Renkli Bölümü */
    .cabin-rect {
      width: 70%;
      height: 100%;
      transition: background-color 0.3s ease;
    }

    /* Kabin Numarası */
    .cabin-num {
      font-size: 0.85rem;
      color: #7f95a5;
      font-weight: 400;
      width: 30%;
      text-align: center;
    }

    /* Alt Kısım: Giriş ve You Are Here */
    .bottom-entrance {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 15px;
      width: 100%;
      z-index: 2;
    }

    .gate-line {
      width: 50px;
      height: 12px;
      border-left: 1.5px solid #7f95a5;
      border-right: 1.5px solid #7f95a5;
      border-bottom: 1.5px solid transparent;
    }

    .you-are-here {
      font-size: 0.65rem;
      color: #7f95a5;
      letter-spacing: 0.05em;
      margin-top: 4px;
      font-weight: 500;
    }

    /* Alt Alan: Devasa ZARA Logosu */
    .brand-footer {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-top: 1vh;
    }

    .zara-logo {
      font-family: 'Cormorant Garamond', 'Didot', serif;
      font-size: 7.5rem;
      font-weight: 300;
      letter-spacing: -0.06em;
      color: #000000;
      line-height: 0.8;
      transform: scaleX(0.92);
    }

    /* Bağlantı Noktası ve Overlay */
    .conn-dot {
      position: fixed;
      bottom: 10px;
      right: 10px;
      width: 4px;
      height: 4px;
      border-radius: 50%;
    }
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #e8eff3;
      z-index: 10;
    }
    .overlay.visible { display: flex; }

    @keyframes cabinBlink { 0%,100%{opacity:1} 50%{opacity:0.4} }
  </style>
</head>
<body>

  <div class="top-counter">
    <div class="label-top">AVAILABLE</div>
    <div class="count" id="count">—</div>
    <div class="label-bottom">FREE ROOMS</div>
  </div>

  <div class="floorplan-wrapper">
    <div class="map-frame">
      <div class="columns-container">
        
        <!-- Sol Kolon (Kabin 04 - 13) -->
        <div class="left-column">
          <div class="cabin-box"><div id="r13" class="cabin-rect"></div><div class="cabin-num">13</div></div>
          <div class="cabin-box"><div id="r12" class="cabin-rect"></div><div class="cabin-num">12</div></div>
          <div class="cabin-box"><div id="r11" class="cabin-rect"></div><div class="cabin-num">11</div></div>
          <div class="cabin-box"><div id="r10" class="cabin-rect"></div><div class="cabin-num">10</div></div>
          <div class="cabin-box"><div id="r09" class="cabin-rect"></div><div class="cabin-num">09</div></div>
          <div class="cabin-box"><div id="r08" class="cabin-rect"></div><div class="cabin-num">08</div></div>
          <div class="cabin-box"><div id="r07" class="cabin-rect"></div><div class="cabin-num">07</div></div>
          <div class="cabin-box"><div id="r06" class="cabin-rect"></div><div class="cabin-num">06</div></div>
          <div class="cabin-box"><div id="r05" class="cabin-rect"></div><div class="cabin-num">05</div></div>
          <div class="cabin-box"><div id="r04" class="cabin-rect"></div><div class="cabin-num">04</div></div>
        </div>

        <!-- Sağ Kolon (Kabin 01 - 03) -->
        <div class="right-column">
          <div class="cabin-box"><div id="r03" class="cabin-rect"></div><div class="cabin-num">03</div></div>
          <div class="cabin-box"><div id="r02" class="cabin-rect"></div><div class="cabin-num">02</div></div>
          <div class="cabin-box"><div id="r01" class="cabin-rect"></div><div class="cabin-num">01</div></div>
        </div>

      </div>

      <!-- Giriş Kapısı Çizgisi ve Yazısı -->
      <div class="bottom-entrance">
        <div class="gate-line"></div>
        <div class="you-are-here">YOU ARE HERE</div>
      </div>
    </div>
  </div>

  <div class="brand-footer">
    <div class="zara-logo">ZARA</div>
  </div>

  <div class="overlay" id="overlay"></div>
  <div class="conn-dot" id="conn-dot"></div>

<script>
  const params   = new URLSearchParams(window.location.search);
  const STORE_ID = params.get('store') || 'store-001';
  const WS_URL   = `${window.location.protocol === 'https:' ? 'wss' : 'ws'}://${window.location.host}?store=${STORE_ID}`;

  const FILLS = { 
    empty: '#9fe3be',     /* Görseldeki canlı açık yeşil */
    full: '#8fa0b0',      /* Görseldeki pastel gri/mavi dolu rengi */
    clearing: '#ffffff'
  };

  let cabins = [];
  let ws = null;

  const countEl = document.getElementById('count');
  const overlay = document.getElementById('overlay');

  function updateCount() {
    const free = cabins.filter(c => c.state === 'empty').length;
    countEl.textContent = free;
  }

  function applyState(id, state) {
    const num = parseInt(id, 10);
    if (isNaN(num)) return;
    const paddedId = num < 10 ? `0${num}` : `${num}`;
    const rect = document.getElementById(`r${paddedId}`);
    if (!rect) return;

    rect.style.backgroundColor = FILLS[state];
    if (state === 'clearing') {
      rect.style.animation = 'cabinBlink 1.2s ease-in-out infinite';
    } else {
      rect.style.animation = '';
    }
    updateCount();
  }

  function renderAll() {
    cabins.forEach(c => applyState(c.id, c.state));
  }

  function connect() {
    if (!window.location.host) return;
    try {
      ws = new WebSocket(WS_URL);
    } catch (e) {
      setTimeout(connect, 2000);
      return;
    }

    ws.onopen = () => overlay.classList.remove('visible');
    
    ws.onmessage = (event) => {
      try {
        const data = JSON.parse(event.data);
        if (data.type === 'init') {
          cabins = data.cabins;
          renderAll();
        }
        if (data.type === 'update') {
          const cabin = cabins.find(c => parseInt(c.id, 10) === parseInt(data.id, 10));
          if (cabin) cabin.state = data.state;
          applyState(data.id, data.state);
        }
      } catch (err) {}
    };

    ws.onclose = () => {
      overlay.classList.add('visible');
      setTimeout(connect, 2000);
    };
    ws.onerror = () => ws.close();
  }

  connect();
</script>
</body>
</html>
