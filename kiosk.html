<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fitting Rooms</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;300&display=swap');

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #e8eff3;
      color: #000000;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 12vh 0 10vh 0;
      overflow: hidden;
      user-select: none;
    }

    
    .top-counter {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .label-top, .label-bottom {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.9rem;
      font-weight: 100;
      letter-spacing: 0.4em;
      color: #5a656e;
      text-transform: uppercase;
    }

    .count {
      font-size: 11.5rem;
      font-weight: 100;
      color: #000000;
      line-height: 0.85;
      margin: 2.5vh 0;
      font-variant-numeric: tabular-nums;
    }

    
    .floorplan-wrapper {
      flex: 1;
      width: 100%;
      max-width: 380px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 8vh 0;
    }

    .floorplan-svg {
      width: 100%;
      height: auto;
      display: block;
    }

    
    .fp-wall {
      fill: none;
      stroke: #7f95a5;
      stroke-width: 1.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

   
    .cabin-rect {
      transition: fill 0.3s ease;
    }

    
    .fp-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 9.5px;
      font-weight: 100;
      fill: #434c54;
    }

    .you-are-here {
      font-family: 'Montserrat', sans-serif;
      font-size: 7.5px;
      fill: #7f95a5;
      letter-spacing: 0.12em;
      font-weight: 300;
    }

    
    .brand-footer {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .zara-logo {
      font-family: "Times New Roman", Times, Baskerville, Georgia, serif;
      font-size: 5.5rem;
      font-weight: 400;
      color: #000000;
      line-height: 0.8;
      letter-spacing: -0.15em; 
      transform: scaleX(0.85); 
      display: inline-block;
      white-space: nowrap;
    }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #e8eff3;
      z-index: 10;
    }
    .overlay.visible { display: flex; }
    .conn-dot { position: fixed; bottom: 10px; right: 10px; width: 4px; height: 4px; border-radius: 50%; }
    @keyframes cabinBlink { 0%,100%{opacity:1} 50%{opacity:0.4} }
  </style>
</head>
<body>

  <div class="top-counter">
    <div class="label-top">AVAILABLE</div>
    <div class="count" id="count">—</div>
    <div class="label-bottom">FREE ROOMS</div>
  </div>

  <div class="floorplan-wrapper">
    <svg class="floorplan-svg" viewBox="0 0 290 330" xmlns="http://www.w3.org/2000/svg">
     
      <path class="fp-wall" d="M 20,300 L 20,10 L 165,10 L 165,205 L 270,205 L 270,300" />
      
      
      <line class="fp-wall" x1="20" y1="300" x2="120" y2="300" />
      <line class="fp-wall" x1="170" y1="300" x2="270" y2="300" />

      
      <g id="left-cabins">
        <rect id="r13" class="cabin-rect" x="30" y="20" width="55" height="22" />
        <text x="95" y="34" class="fp-label">13</text>

        <rect id="r12" class="cabin-rect" x="30" y="47" width="55" height="22" />
        <text x="95" y="61" class="fp-label">12</text>

        <rect id="r11" class="cabin-rect" x="30" y="74" width="55" height="22" />
        <text x="95" y="88" class="fp-label">11</text>

        <rect id="r10" class="cabin-rect" x="30" y="101" width="55" height="22" />
        <text x="95" y="115" class="fp-label">10</text>

        <rect id="r09" class="cabin-rect" x="30" y="128" width="55" height="22" />
        <text x="98" y="142" class="fp-label">9</text>

        <rect id="r08" class="cabin-rect" x="30" y="155" width="55" height="22" />
        <text x="98" y="169" class="fp-label">8</text>

        <rect id="r07" class="cabin-rect" x="30" y="182" width="55" height="22" />
        <text x="98" y="196" class="fp-label">7</text>

        <rect id="r06" class="cabin-rect" x="30" y="209" width="55" height="22" />
        <text x="98" y="223" class="fp-label">6</text>

        <rect id="r05" class="cabin-rect" x="30" y="236" width="55" height="22" />
        <text x="98" y="250" class="fp-label">5</text>

        <rect id="r04" class="cabin-rect" x="30" y="263" width="55" height="22" />
        <text x="98" y="277" class="fp-label">4</text>
      </g>

     
      <g id="right-cabins">
        <rect id="r03" class="cabin-rect" x="205" y="215" width="55" height="22" />
        <text x="185" y="229" class="fp-label">3</text>

        <rect id="r02" class="cabin-rect" x="205" y="242" width="55" height="22" />
        <text x="185" y="256" class="fp-label">2</text>

        <rect id="r01" class="cabin-rect" x="205" y="269" width="55" height="22" />
        <text x="185" y="283" class="fp-label">1</text>
      </g>

     
      <text x="145" y="322" class="you-are-here" text-anchor="middle">YOU ARE HERE</text>
    </svg>
  </div>

 
  <div class="brand-footer">
    <div class="zara-logo">ZARA</div>
  </div>

  <div class="overlay" id="overlay"></div>
  <div class="conn-dot" id="conn-dot"></div>

<script>
  const params   = new URLSearchParams(window.location.search);
  const STORE_ID = params.get('store') || 'store-001';
  const WS_URL   = `${window.location.protocol === 'https:' ? 'wss' : 'ws'}://${window.location.host}?store=${STORE_ID}`;

  const FILLS = { 
    empty: '#9fe3be',
    full: '#8fa0b0',
    clearing: '#ffffff'
  };

  let cabins = [];
  let ws = null;

  const countEl = document.getElementById('count');
  const overlay = document.getElementById('overlay');

  function updateCount() {
    const free = cabins.filter(c => c.state === 'empty').length;
    countEl.textContent = free;
  }

  function applyState(id, state) {
    const num = parseInt(id, 10);
    if (isNaN(num)) return;
    const paddedId = num < 10 ? `0${num}` : `${num}`;
    const rect = document.getElementById(`r${paddedId}`);
    if (!rect) return;

    rect.setAttribute('fill', FILLS[state]);
    if (state === 'clearing') {
      rect.style.animation = 'cabinBlink 1.2s ease-in-out infinite';
    } else {
      rect.style.animation = '';
    }
    updateCount();
  }

  function renderAll() {
    cabins.forEach(c => applyState(c.id, c.state));
  }

  function connect() {
    if (!window.location.host) return;
    try {
      ws = new WebSocket(WS_URL);
    } catch (e) {
      setTimeout(connect, 2000);
      return;
    }

    ws.onopen = () => overlay.classList.remove('visible');
    
    ws.onmessage = (event) => {
      try {
        const data = JSON.parse(event.data);
        if (data.type === 'init') {
          cabins = data.cabins;
          renderAll();
        }
        if (data.type === 'update') {
          const cabin = cabins.find(c => parseInt(c.id, 10) === parseInt(data.id, 10));
          if (cabin) cabin.state = data.state;
          applyState(data.id, data.state);
        }
      } catch (err) {}
    };

    ws.onclose = () => {
      overlay.classList.add('visible');
      setTimeout(connect, 2000);
    };
    ws.onerror = () => ws.close();
  }

  connect();
</script>
</body>
</html>
