<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fitting Rooms</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap');

    body {
      font-family: 'Helvetica Neue', Helvetica, 'Inter', Arial, sans-serif;
      background: #e9f0f4; 
      color: #000000;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: none;
      -webkit-font-smoothing: antialiased;
    }

    .screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      height: 96vh; 
      width: 100%;
      max-width: 540px;
      max-height: 1000px;
      padding: 1.5rem 1rem 0.5rem;
      margin: auto;
    }

    .top { 
      text-align: center; 
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .label-top {
      font-size: 32px;
      font-weight: 200;
      letter-spacing: 0.12em;
      color: #4a5560;
      text-transform: uppercase;
      line-height: 1.2;
    }

    .count {
      font-size: 140px;
      font-weight: 200;
      color: #000000;
      line-height: 0.95;
      margin: 2px 0;
      letter-spacing: -0.01em;
      font-variant-numeric: tabular-nums;
    }

    .label-bottom {
      font-size: 30px;
      font-weight: 200;
      letter-spacing: 0.12em;
      color: #4a5560;
      text-transform: uppercase;
      line-height: 1.2;
    }

    .floorplan-container {
      flex-grow: 1;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.5rem 0;
    }

    .floorplan-container svg {
      display: block;
    }

    /* Orijinal plandaki gibi ince mimari hatlar */
    .fp-wall {
      fill: none;
      stroke: #7f95a5;
      stroke-width: 0.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    
    .fp-text {
      font-family: 'Helvetica Neue', Helvetica, 'Inter', Arial, sans-serif;
      font-size: 8.5px;
      fill: #2c353d;
      font-weight: 500;
      text-anchor: middle;
      dominant-baseline: central;
    }

    .brand {
      margin-top: 0.2rem;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
    }
    
    .zara-logo {
      font-family: 'Didot', 'Bodoni MT', 'Cormorant Garamond', serif;
      font-size: 84px; 
      font-weight: 400;
      letter-spacing: -0.08em;
      color: #000000;
      text-transform: uppercase;
      transform: scaleX(0.95);
      line-height: 1;
    }
    .zara-logo span {
      margin-right: -0.05em;
    }

    .conn-dot {
      position: fixed;
      bottom: 1.2rem;
      right: 1.2rem;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: transparent;
    }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #e9f0f4;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .overlay.visible { display: flex; }

    @keyframes cabinBlink { 0%,100%{opacity:1} 50%{opacity:0.4} }
  </style>
</head>
<body>

<div class="screen">
  <div class="top">
    <p class="label-top">AVAILABLE</p>
    <p class="count" id="count">—</p>
    <p class="label-bottom">FREE ROOMS</p>
  </div>

  <!-- İlk fotoğraftaki asimetrik mimari koridor ve tam 12 adet kabin düzeni -->
  <div class="floorplan-container">
    <svg id="fp" viewBox="0 0 170 340" width="280" xmlns="http://www.w3.org/2000/svg">
      <!-- Orijinal plandaki asimetrik daralan koridor duvarları (Çakışma yapmayacak şekilde) -->
      <polyline class="fp-wall" points="40,25 120,25 145,285 145,300" />
      <polyline class="fp-wall" points="30,25 30,295 72,295 72,305 48,305 48,312" />
      <line class="fp-wall" x1="58" y1="312" x2="58" y2="324" />
      <polyline class="fp-wall" points="40,324 82,324 82,318 132,318 132,335" />

      <!-- Sol Kabin Grubu (8 Adet - Başlangıçta siyah kalmaması için varsayılan gri fill eklendi) -->
      <g id="left-cabins">
        <rect id="r12" fill="#8fa0b0" x="42" y="29" width="26" height="21" /><text class="fp-text" x="74" y="40">12</text>
        <rect id="r11" fill="#8fa0b0" x="42" y="54" width="26" height="21" /><text class="fp-text" x="74" y="65">11</text>
        <rect id="r10" fill="#8fa0b0" x="42" y="79" width="26" height="21" /><text class="fp-text" x="74" y="90">10</text>
        <rect id="r9"  fill="#8fa0b0" x="42" y="104" width="26" height="21" /><text class="fp-text" x="74" y="115">09</text>
        <rect id="r8"  fill="#8fa0b0" x="42" y="129" width="26" height="21" /><text class="fp-text" x="74" y="140">08</text>
        <rect id="r7"  fill="#8fa0b0" x="42" y="154" width="26" height="21" /><text class="fp-text" x="74" y="165">07</text>
        <rect id="r6"  fill="#8fa0b0" x="42" y="179" width="26" height="21" /><text class="fp-text" x="74" y="190">06</text>
        <rect id="r5"  fill="#8fa0b0" x="42" y="204" width="26" height="21" /><text class="fp-text" x="74" y="215">05</text>
      </g>

      <!-- Sağ Kabin Grubu (4 Adet) -->
      <g id="right-cabins">
        <rect id="r4" fill="#8fa0b0" x="104" y="104" width="24" height="20" /><text class="fp-text" x="87" y="115">04</text>
        <rect id="r3" fill="#8fa0b0" x="104" y="129" width="24" height="20" /><text class="fp-text" x="87" y="140">03</text>
        <rect id="r2" fill="#8fa0b0" x="104" y="154" width="24" height="20" /><text class="fp-text" x="87" y="165">02</text>
        <rect id="r1" fill="#8fa0b0" x="104" y="179" width="24" height="20" /><text class="fp-text" x="87" y="190">01</text>
      </g>

      <!-- Konum Göstergesi -->
      <text x="30" y="318" font-size="5" fill="#7f95a5" font-family="Inter, sans-serif" font-weight="500" letter-spacing="0.02em">YOU ARE HERE</text>
    </svg>
  </div>

  <div class="brand">
    <div class="zara-logo">Z<span>A</span>R<span>A</span></div>
  </div>
</div>

<div class="overlay" id="overlay"></div>
<div class="conn-dot" id="conn-dot"></div>

<script>
  const params     = new URLSearchParams(window.location.search);
  const STORE_ID   = params.get('store') || 'store-001';
  const WS_URL     = `${window.location.protocol === 'https:' ? 'wss' : 'ws'}://${window.location.host}?store=${STORE_ID}`;

  let CLEARING_DURATION_MS = 30 * 1000;
  fetch('/api/config').then(r => r.json()).then(cfg => {
    if (cfg.clearingToEmptyMs) CLEARING_DURATION_MS = cfg.clearingToEmptyMs;
  }).catch(() => {});

  /* Soldurulmuş renk setleri */
  const FILLS = { 
    empty: '#a3e4c4',     /* Soldurulmuş yeşil */
    full: '#8fa0b0',      /* Soldurulmuş gri */
    clearing: '#ffffff'   /* Beyaz */
  };

  let cabins       = [];
  let ws           = null;
  let retryTimeout = null;
  let retryDelay   = 1000;

  const dot       = document.getElementById('conn-dot');
  const overlay   = document.getElementById('overlay');
  const countEl   = document.getElementById('count');

  function goFullscreen() {
    document.documentElement.requestFullscreen().catch(() => {});
  }
  document.addEventListener('keydown', e => {
    if (e.key === 'f' || e.key === 'F') goFullscreen();
  });
  document.addEventListener('click', () => goFullscreen());

  function setConnected(state) {
    dot.className = 'conn-dot' + (state === 'connected' ? ' connected' : state === 'reconnecting' ? ' reconnecting' : '');
    overlay.classList.toggle('visible', state !== 'connected');
  }

  function updateCount() {
    const free = cabins.filter(c => c.state === 'empty').length;
    countEl.textContent = free;
  }

  function applyState(id, state) {
    const rect = document.getElementById(`r${id}`);
    if (!rect) return;

    rect.setAttribute('fill', FILLS[state]);

    if (state === 'clearing') {
      rect.style.animation = 'cabinBlink 1.2s ease-in-out infinite';
    } else {
      rect.style.animation = '';
    }
    updateCount();
  }

  function renderAll() {
    cabins.forEach(c => applyState(c.id, c.state));
  }

  function connect() {
    if (!window.location.host) {
      setConnected('reconnecting');
      return;
    }

    if (ws) { ws.onclose = null; ws.close(); }

    try {
      ws = new WebSocket(WS_URL);
    } catch (err) {
      console.error(err);
      setConnected('reconnecting');
      scheduleRetry();
      return;
    }

    ws.onopen = () => {
      retryDelay = 1000;
      setConnected('connected');
    };

    ws.onmessage = (event) => {
      try {
        const data = JSON.parse(event.data);
        if (data.type === 'init') {
          cabins = data.cabins;
          if (data.clearingToEmptyMs) CLEARING_DURATION_MS = data.clearingToEmptyMs;
          renderAll();
        }
        if (data.type === 'update') {
          const cabin = cabins.find(c => c.id === data.id);
          if (cabin) cabin.state = data.state;
          applyState(data.id, data.state);
        }
      } catch (err) {
        console.error(err);
      }
    };

    ws.onclose = () => {
      setConnected('reconnecting');
      scheduleRetry();
    };

    ws.onerror = () => { ws.close(); };
  }

  function scheduleRetry() {
    clearTimeout(retryTimeout);
    retryTimeout = setTimeout(() => {
      connect();
      retryDelay = Math.min(retryDelay * 2, 16000);
    }, retryDelay);
  }

  connect();
</script>
</body>
</html>
