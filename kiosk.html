<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fitting Rooms</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap');

    body {
      font-family: 'Helvetica Neue', Helvetica, 'Inter', Arial, sans-serif;
      background: #e9f0f4; 
      color: #000000;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: none;
      -webkit-font-smoothing: antialiased;
    }

    .screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      height: 96vh; 
      width: 100%;
      max-width: 540px;
      max-height: 1000px;
      padding: 1.5rem 1rem 0.5rem;
      margin: auto;
    }

    .top { 
      text-align: center; 
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .label-top {
      font-size: 32px;
      font-weight: 200;
      letter-spacing: 0.12em;
      color: #4a5560;
      text-transform: uppercase;
      line-height: 1.2;
    }

    .count {
      font-size: 140px;
      font-weight: 200;
      color: #000000;
      line-height: 0.95;
      margin: 2px 0;
      letter-spacing: -0.01em;
      font-variant-numeric: tabular-nums;
    }

    .label-bottom {
      font-size: 30px;
      font-weight: 200;
      letter-spacing: 0.12em;
      color: #4a5560;
      text-transform: uppercase;
      line-height: 1.2;
    }

    .floorplan-container {
      flex-grow: 1;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.5rem 0;
    }

    .floorplan-container svg {
      display: block;
    }

    /* Minimalist ve net mimari hatlar */
    .fp-wall {
      fill: none;
      stroke: #7f95a5;
      stroke-width: 1.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    
    .fp-text {
      font-family: 'Helvetica Neue', Helvetica, 'Inter', Arial, sans-serif;
      font-size: 8px;
      fill: #2c353d;
      font-weight: 500;
      text-anchor: middle;
      dominant-baseline: central;
    }

    .brand {
      margin-top: 0.2rem;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
    }
    
    .zara-logo {
      font-family: 'Didot', 'Bodoni MT', 'Cormorant Garamond', serif;
      font-size: 84px; 
      font-weight: 400;
      letter-spacing: -0.08em;
      color: #000000;
      text-transform: uppercase;
      transform: scaleX(0.95);
      line-height: 1;
    }
    .zara-logo span {
      margin-right: -0.05em;
    }

    .conn-dot {
      position: fixed;
      bottom: 1.2rem;
      right: 1.2rem;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: transparent;
    }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #e9f0f4;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .overlay.visible { display: flex; }

    @keyframes cabinBlink { 0%,100%{opacity:1} 50%{opacity:0.4} }
  </style>
</head>
<body>

<div class="screen">
  <div class="top">
    <p class="label-top">AVAILABLE</p>
    <p class="count" id="count">—</p>
    <p class="label-bottom">FREE ROOMS</p>
  </div>

  <!-- Temiz, çakışmayan ve simetrik yeni mimari kat planı -->
  <div class="floorplan-container">
    <svg id="fp" viewBox="0 0 200 340" width="260" xmlns="http://www.w3.org/2000/svg">
      <!-- Dış Mimari Duvarlar -->
      <polyline class="fp-wall" points="15,10 185,10 185,300 135,300 135,330 65,330 65,300 15,300 15,10" />
      
      <!-- Sol Kabin Sırası (Simetrik ve Hizalı 10 Kabin) -->
      <g id="left-cabins">
        <rect id="r19" x="20" y="15" width="32" height="24" /><text class="fp-text" x="36" y="27">19</text>
        <rect id="r18" x="20" y="43" width="32" height="24" /><text class="fp-text" x="36" y="55">18</text>
        <rect id="r17" x="20" y="71" width="32" height="24" /><text class="fp-text" x="36" y="83">17</text>
        <rect id="r16" x="20" y="99" width="32" height="24" /><text class="fp-text" x="36" y="111">16</text>
        <rect id="r15" x="20" y="127" width="32" height="24" /><text class="fp-text" x="36" y="139">15</text>
        <rect id="r14" x="20" y="155" width="32" height="24" /><text class="fp-text" x="36" y="167">14</text>
        <rect id="r12" x="20" y="183" width="32" height="24" /><text class="fp-text" x="36" y="195">12</text>
        <rect id="r10" x="20" y="211" width="32" height="24" /><text class="fp-text" x="36" y="223">10</text>
        <rect id="r8"  x="20" y="239" width="32" height="24" /><text class="fp-text" x="36" y="251">08</text>
        <rect id="r6"  x="20" y="267" width="32" height="24" /><text class="fp-text" x="36" y="279">06</text>
      </g>

      <!-- Sağ Kabin Sırası (Simetrik ve Hizalı 9 Kabin) -->
      <g id="right-cabins">
        <rect id="r13" x="148" y="15" width="32" height="24" /><text class="fp-text" x="164" y="27">13</text>
        <rect id="r11" x="148" y="43" width="32" height="24" /><text class="fp-text" x="164" y="55">11</text>
        <rect id="r9"  x="148" y="71" width="32" height="24" /><text class="fp-text" x="164" y="83">09</text>
        <rect id="r7"  x="148" y="99" width="32" height="24" /><text class="fp-text" x="164" y="111">07</text>
        <rect id="r5"  x="148" y="127" width="32" height="24" /><text class="fp-text" x="164" y="139">05</text>
        <rect id="r3"  x="148" y="155" width="32" height="24" /><text class="fp-text" x="164" y="167">03</text>
        <rect id="r1"  x="148" y="183" width="32" height="24" /><text class="fp-text" x="164" y="195">01</text>
        <rect id="r4"  x="148" y="211" width="32" height="24" /><text class="fp-text" x="164" y="223">04</text>
        <rect id="r2"  x="148" y="239" width="32" height="24" /><text class="fp-text" x="164" y="251">02</text>
      </g>

      <!-- Giriş ve Konum Belirteci -->
      <text x="100" y="318" font-size="6" fill="#7f95a5" font-family="Inter, sans-serif" font-weight="500" letter-spacing="0.04em" text-anchor="middle">YOU ARE HERE</text>
    </svg>
  </div>

  <div class="brand">
    <div class="zara-logo">Z<span>A</span>R<span>A</span></div>
  </div>
</div>

<div class="overlay" id="overlay"></div>
<div class="conn-dot" id="conn-dot"></div>

<script>
  const params     = new URLSearchParams(window.location.search);
  const STORE_ID   = params.get('store') || 'store-001';
  const WS_URL     = `${window.location.protocol === 'https:' ? 'wss' : 'ws'}://${window.location.host}?store=${STORE_ID}`;

  let CLEARING_DURATION_MS = 30 * 1000;
  fetch('/api/config').then(r => r.json()).then(cfg => {
    if (cfg.clearingToEmptyMs) CLEARING_DURATION_MS = cfg.clearingToEmptyMs;
  }).catch(() => {});

  /* Beğendiğin soldurulmuş renk tonları korundu */
  const FILLS = { 
    empty: '#a3e4c4',     /* Soldurulmuş pastel yeşil */
    full: '#8fa0b0',      /* Soldurulmuş kapalı gri */
    clearing: '#ffffff'   /* Beyaz */
  };

  let cabins       = [];
  let ws           = null;
  let retryTimeout = null;
  let retryDelay   = 1000;

  const dot       = document.getElementById('conn-dot');
  const overlay   = document.getElementById('overlay');
  const countEl   = document.getElementById('count');

  function goFullscreen() {
    document.documentElement.requestFullscreen().catch(() => {});
  }
  document.addEventListener('keydown', e => {
    if (e.key === 'f' || e.key === 'F') goFullscreen();
  });
  document.addEventListener('click', () => goFullscreen());

  function setConnected(state) {
    dot.className = 'conn-dot' + (state === 'connected' ? ' connected' : state === 'reconnecting' ? ' reconnecting' : '');
    overlay.classList.toggle('visible', state !== 'connected');
  }

  function updateCount() {
    const free = cabins.filter(c => c.state === 'empty').length;
    countEl.textContent = free;
  }

  function applyState(id, state) {
    const rect = document.getElementById(`r${id}`);
    if (!rect) return;

    rect.setAttribute('fill', FILLS[state]);

    if (state === 'clearing') {
      rect.style.animation = 'cabinBlink 1.2s ease-in-out infinite';
    } else {
      rect.style.animation = '';
    }
    updateCount();
  }

  function renderAll() {
    cabins.forEach(c => applyState(c.id, c.state));
  }

  function connect() {
    if (!window.location.host) {
      setConnected('reconnecting');
      return;
    }

    if (ws) { ws.onclose = null; ws.close(); }

    try {
      ws = new WebSocket(WS_URL);
    } catch (err) {
      console.error(err);
      setConnected('reconnecting');
      scheduleRetry();
      return;
    }

    ws.onopen = () => {
      retryDelay = 1000;
      setConnected('connected');
    };

    ws.onmessage = (event) => {
      try {
        const data = JSON.parse(event.data);
        if (data.type === 'init') {
          cabins = data.cabins;
          if (data.clearingToEmptyMs) CLEARING_DURATION_MS = data.clearingToEmptyMs;
          renderAll();
        }
        if (data.type === 'update') {
          const cabin = cabins.find(c => c.id === data.id);
          if (cabin) cabin.state = data.state;
          applyState(data.id, data.state);
        }
      } catch (err) {
        console.error(err);
      }
    };

    ws.onclose = () => {
      setConnected('reconnecting');
      scheduleRetry();
    };

    ws.onerror = () => { ws.close(); };
  }

  function scheduleRetry() {
    clearTimeout(retryTimeout);
    retryTimeout = setTimeout(() => {
      connect();
      retryDelay = Math.min(retryDelay * 2, 16000);
    }, retryDelay);
  }

  connect();
</script>
</body>
</html>
